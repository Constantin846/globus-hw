spring:
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:file:./db/globus
    username: local
    password: ${DB_PASSWORD}
    driverClassName: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create

logging:
  level:
    org:
      springframework:
        security:
          web: DEBUG
    org.hibernate:
      SQL: DEBUG
      type: TRACE
      orm.jdbc.bind: TRACE
    
